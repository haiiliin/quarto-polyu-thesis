title: The Hong Kong Polytechnic University Thesis Template
author: Hailin Wang
version: 1.0.0
quarto-required: ">=1.6.0"
contributes:
  formats:
    pdf:
      toc: false
      documentclass: scrreprt
      classoption:
        - 12pt
        - twoside=true
        - openright
        - parskip=full
        - chapterprefix=true
        - headings=normal
        - bibliography=totoc
        - listof=totoc
        - titlepage=on
        - captions=tableabove
      papersize: a4
      template-partials:
        - partials/before-title.tex
        - partials/before-body.tex
      format-resources:
        - cleanthesis.sty
        - PolyU_Logo_CMKY.pdf
      cite-method: biblatex
      biblio-style: apa
      biblatexoptions:
        - natbib=true
        - maxcitenames=2
        - uniquename=false
        - uniquelist=false
      top-level-division: chapter
      mathspec: true  # unicode-math package cannot show greek letters
